<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi Mật Khẩu</title>
    <style>
        /* Google Font - Poppins */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #29abe2, #90caf9); /* Xanh nước biển nhạt dần */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            padding: 50px;
            width: 450px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            transform: scale(0.98);
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease-out;
            position: relative; /* Để định vị các ngôi sao bên trong */
        }

        body.loaded .container {
            transform: scale(1);
            opacity: 1;
        }

        h1 {
            text-align: center;
            color: #33475b; /* Màu chữ tối hơn cho nền xanh */
            margin-bottom: 40px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 35px;
            position: relative;
            display: flex;
            align-items: center;
        }

        label {
            display: block;
            color: #455a64; /* Màu chữ tối hơn cho label */
            margin-bottom: 12px;
            font-size: 1rem;
            font-weight: 600;
            flex-basis: 100%;
        }

        input[type="password"],
        input[type="text"] {
            width: calc(100% - 30px);
            padding: 16px;
            border: 1.5px solid #90caf9; /* Viền xanh nhạt */
            border-radius: 12px;
            font-size: 1.1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input[type="password"]:focus,
        input[type="text"]:focus {
            border-color: #1e88e5; /* Màu focus xanh đậm hơn */
            outline: none;
            box-shadow: 0 0 10px rgba(30, 136, 229, 0.25); /* Bóng đổ xanh khi focus */
        }

        input[type="submit"] {
            background: linear-gradient(135deg, #1e88e5, #bbdefb); /* Gradient xanh */
            color: white;
            padding: 18px 28px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: background 0.3s ease, transform 0.2s ease-in-out;
        }

        input[type="submit"]:hover {
            background: linear-gradient(135deg, #bbdefb, #1e88e5); /* Gradient xanh đảo ngược khi hover */
            transform: scale(1.02);
        }

        .error {
            color: #d32f2f; /* Màu đỏ lỗi */
            text-align: center;
            margin-top: 15px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 40px;
            color: #1e88e5; /* Màu xanh liên kết */
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 600;
            transition: color 0.3s ease, transform 0.2s ease-in-out;
        }

        /* Hiệu ứng sóng nền */
        .wave {
            position: absolute;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 45%;
            top: -100%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(0);
            animation: waveAnimation 8s infinite linear;
        }

        .wave:nth-child(2) {
            background: rgba(255, 255, 255, 0.15);
            animation-delay: 2s;
        }

        .wave:nth-child(3) {
            background: rgba(255, 255, 255, 0.2);
            animation-delay: 4s;
        }

        @keyframes waveAnimation {
            0% {
                transform: translate(-50%, -50%) rotate(0deg) scale(1);
            }
            50% {
                transform: translate(-50%, -50%) rotate(180deg) scale(1.2);
            }
            100% {
                transform: translate(-50%, -50%) rotate(360deg) scale(1);
            }
        }

        /* CSS cho hiển thị/ẩn mật khẩu */
        .password-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #777;
        }

        /* CSS cho yêu cầu mật khẩu */
        .password-requirements {
            list-style: none;
            padding: 0;
            margin-top: 8px;
            color: #455a64; /* Màu chữ tối hơn cho yêu cầu */
            font-size: 0.9rem;
            margin-left: 0;
        }

        .password-requirements li::before {
            content: "•";
            color: #90caf9; /* Màu xanh nhạt cho dấu chấm đầu dòng */
            display: inline-block;
            width: 1em;
            margin-left: -1em;
        }

        /* CSS cho hiệu ứng ngôi sao bay */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 2s linear infinite,
                       fly 4s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 0.8; transform: scale(1); }
        }

        @keyframes fly {
            0% {
                transform: translate(var(--startX), var(--startY)) scale(var(--startScale));
                opacity: 0.8;
            }
            100% {
                transform: translate(var(--endX), var(--endY)) scale(var(--endScale));
                opacity: 0;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="loaded">
    <div class="container">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
        <h1>Đổi Mật Khẩu</h1>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label for="current_password">Mật khẩu hiện tại:</label>
                <input type="password" id="current_password" name="current_password" required>
                <span class="password-toggle"><i class="fas fa-eye"></i></span>
            </div>

            <div class="form-group">
                <label for="new_password">Mật khẩu mới:</label>
                <ul class="password-requirements">
                    <li>Ít nhất 8 ký tự</li>
                    <li>Chứa ít nhất một chữ cái viết thường</li>
                    <li>Chứa ít nhất một chữ cái viết hoa</li>
                    <li>Chứa ít nhất một chữ số</li>
                </ul>
                <input type="password" id="new_password" name="new_password" required style="margin-top: 10px;">
            </div>

            <div class="form-group">
                <label for="confirm_new_password">Xác nhận mật khẩu mới:</label>
                <input type="password" id="confirm_new_password" name="confirm_new_password" required>
                <span class="password-toggle"><i class="fas fa-eye"></i></span>
            </div>

            <input type="submit" value="Đổi mật khẩu">
        </form>

        <a href="{{ url_for('index') }}" class="back-link">Quay lại trang chủ</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.querySelector('.container');
            const numStars = 30; // Số lượng ngôi sao

            for (let i = 0; i < numStars; i++) {
                const star = document.createElement('div');
                star.classList.add('star');

                // Kích thước ngẫu nhiên
                const size = Math.random() * 3 + 2; // Kích thước từ 2px đến 5px
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;

                // Vị trí ban đầu ngẫu nhiên (nằm ngoài khung nhìn một chút)
                const startX = Math.random() * (container.offsetWidth + 100) - 50;
                const startY = Math.random() * (container.offsetHeight + 100) - 50;
                const endX = Math.random() * (container.offsetWidth + 100) - 50;
                const endY = Math.random() * (container.offsetHeight + 100) - 50;

                // Tỷ lệ scale ngẫu nhiên
                const startScale = Math.random() * 0.8 + 0.2;
                const endScale = Math.random() * 1.2 + 0.5;

                // Gán các biến CSS tùy chỉnh để điều khiển animation
                star.style.setProperty('--startX', `${startX}px`);
                star.style.setProperty('--startY', `${startY}px`);
                star.style.setProperty('--endX', `${endX}px`);
                star.style.setProperty('--endY', `${endY}px`);
                star.style.setProperty('--startScale', startScale);
                star.style.setProperty('--endScale', endScale);

                // Độ trễ animation ngẫu nhiên để các ngôi sao không bay cùng lúc
                const delay = Math.random() * 3;
                star.style.animationDelay = `${delay}s`;

                container.appendChild(star);
            }

            document.body.classList.add('loaded');

            // JavaScript để toggle hiển thị mật khẩu
            const passwordToggles = document.querySelectorAll('.password-toggle');
            passwordToggles.forEach(toggle => {
                toggle.addEventListener('click', function() {
                    const input = this.previousElementSibling;
                    const icon = this.querySelector('i');
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.classList.remove('fa-eye');
                        icon.classList.add('fa-eye-slash');
                    } else {
                        input.type = 'password';
                        icon.classList.remove('fa-eye-slash');
                        icon.classList.add('fa-eye');
                    }
                });
            });
        });
    </script>
</body>
</html>
