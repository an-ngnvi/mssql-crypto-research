<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký</title>
    <style>
        /* Google Font - Poppins */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #29abe2, #90caf9); /* Xanh nước biển nhạt dần */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            padding: 50px;
            width: 450px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            transform: scale(0.98);
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease-out;
            position: relative; /* Để định vị các ngôi sao bên trong */
        }

        body.loaded .container {
            transform: scale(1);
            opacity: 1;
        }

        h1 {
            text-align: center;
            color: #33475b; /* Màu chữ tối hơn cho nền xanh */
            margin-bottom: 40px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 35px;
            position: relative;
            display: flex;
            flex-direction: column; /* Để label và input xếp dọc */
            align-items: flex-start; /* Căn trái nội dung */
            width: 100%; /* Để chiếm toàn bộ chiều rộng container */
        }

        label {
            display: block;
            color: #455a64; /* Màu chữ tối hơn cho label */
            margin-bottom: 12px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%; /* Để label chiếm toàn bộ chiều rộng */
            text-align: left; /* Căn trái label */
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: calc(100% - 32px); /* Tính toán để có padding và không tràn */
            padding: 16px;
            border: 1.5px solid #90caf9; /* Viền xanh nhạt */
            border-radius: 12px;
            font-size: 1.1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="email"]:focus {
            border-color: #1e88e5; /* Màu focus xanh đậm hơn */
            outline: none;
            box-shadow: 0 0 10px rgba(30, 136, 229, 0.25); /* Bóng đổ xanh khi focus */
        }

        input[type="submit"] {
            background: linear-gradient(135deg, #1e88e5, #bbdefb); /* Gradient xanh */
            color: white;
            padding: 18px 28px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: background 0.3s ease, transform 0.2s ease-in-out;
            margin-top: 25px; /* Thêm khoảng cách phía trên nút */
        }

        input[type="submit"]:hover {
            background: linear-gradient(135deg, #bbdefb, #1e88e5); /* Gradient xanh đảo ngược khi hover */
            transform: scale(1.02);
        }

        .error {
            color: #d32f2f; /* Màu đỏ lỗi */
            text-align: center;
            margin-top: 15px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .login-link {
            text-align: center;
            margin-top: 40px;
            font-size: 1.05rem;
            font-weight: 600;
            color: #455a64; /* Màu chữ tối hơn cho liên kết */
        }

        .login-link a {
            color: #1e88e5; /* Màu xanh liên kết */
            text-decoration: none;
            transition: color 0.3s ease, transform 0.2s ease-in-out;
        }

        .login-link a:hover {
            color: #bbdefb; /* Màu xanh nhạt hơn khi hover */
            transform: scale(1.05);
        }

        /* Hiệu ứng sóng nền */
        .wave {
            position: absolute;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 45%;
            top: -100%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(0);
            animation: waveAnimation 8s infinite linear;
        }

        .wave:nth-child(2) {
            background: rgba(255, 255, 255, 0.15);
            animation-delay: 2s;
        }

        .wave:nth-child(3) {
            background: rgba(255, 255, 255, 0.2);
            animation-delay: 4s;
        }

        @keyframes waveAnimation {
            0% {
                transform: translate(-50%, -50%) rotate(0deg) scale(1);
            }
            50% {
                transform: translate(-50%, -50%) rotate(180deg) scale(1.2);
            }
            100% {
                transform: translate(-50%, -50%) rotate(360deg) scale(1);
            }
        }

        /* CSS cho hiệu ứng ngôi sao bay */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 2s linear infinite,
                       fly 4s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 0.8; transform: scale(1); }
        }

        @keyframes fly {
            0% {
                transform: translate(var(--startX), var(--startY)) scale(var(--startScale));
                opacity: 0.8;
            }
            100% {
                transform: translate(var(--endX), var(--endY)) scale(var(--endScale));
                opacity: 0;
            }
        }
    </style>
</head>
<body class="loaded">
    <div class="container">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
        <h1>Đăng ký</h1>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label for="username">Tài khoản:</label><br>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu:</label><br>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-group">
                <label for="address">Địa chỉ:</label><br>
                <input type="text" id="address" name="address" required>
            </div>

            <div class="form-group">
                <label for="phone">Số điện thoại:</label><br>
                <input type="text" id="phone" name="phone" required pattern="[0-9]{10}" title="Số điện thoại phải có 10 chữ số">
            </div>

            <div class="form-group">
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required>
            </div>

            <input type="submit" value="Đăng ký">
        </form>

        <p class="login-link">Đã có tài khoản? <a href="{{ url_for('login') }}">Đăng nhập</a></p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.querySelector('.container');
            const numStars = 30; // Số lượng ngôi sao

            for (let i = 0; i < numStars; i++) {
                const star = document.createElement('div');
                star.classList.add('star');

                // Kích thước ngẫu nhiên
                const size = Math.random() * 3 + 2; // Kích thước từ 2px đến 5px
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;

                // Vị trí ban đầu ngẫu nhiên (nằm ngoài khung nhìn một chút)
                const startX = Math.random() * (container.offsetWidth + 100) - 50;
                const startY = Math.random() * (container.offsetHeight + 100) - 50;
                const endX = Math.random() * (container.offsetWidth + 100) - 50;
                const endY = Math.random() * (container.offsetHeight + 100) - 50;

                // Tỷ lệ scale ngẫu nhiên
                const startScale = Math.random() * 0.8 + 0.2;
                const endScale = Math.random() * 1.2 + 0.5;

                // Gán các biến CSS tùy chỉnh để điều khiển animation
                star.style.setProperty('--startX', `${startX}px`);
                star.style.setProperty('--startY', `${startY}px`);
                star.style.setProperty('--endX', `${endX}px`);
                star.style.setProperty('--endY', `${endY}px`);
                star.style.setProperty('--startScale', startScale);
                star.style.setProperty('--endScale', endScale);

                // Độ trễ animation ngẫu nhiên để các ngôi sao không bay cùng lúc
                const delay = Math.random() * 3;
                star.style.animationDelay = `${delay}s`;

                container.appendChild(star);
            }

            document.body.classList.add('loaded');
        });
    </script>
</body>
</html>
